server {
    listen 80;
    server_name utec.mandarinasoftware.uy;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name utec.mandarinasoftware.uy;

    ssl_certificate     /etc/letsencrypt/live/utec.mandarinasoftware.uy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/utec.mandarinasoftware.uy/privkey.pem;

    access_log /var/log/nginx/sites/utec.mandarinasoftware.uy.access.log;
    error_log  /var/log/nginx/sites/utec.mandarinasoftware.uy.error.log;

    client_max_body_size 2M;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
