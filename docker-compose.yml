services:
  backend:
    build: ./backend
    container_name: utec-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8080"

  frontend:
    build: ./frontend
    container_name: utec-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3030:80"
